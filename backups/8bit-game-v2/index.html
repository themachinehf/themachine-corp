<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMATHINK | 8-Bit World</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0d0d12; --gold: #d4af37; --cyan: #00ffff; --magenta: #ff00ff; }
    html, body { background: var(--bg); transition: opacity 0.3s; color: #fff; font-family: 'Courier New', monospace; height: 100%; overflow: hidden; cursor: crosshair; }
    .pixel-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px); background-size: 8px 8px; z-index: 0; }
    .game-world { position: relative; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1; }
    .pixel-logo { font-family: 'Press Start 2P', cursive; font-size: clamp(24px, 6vw, 48px); text-align: center; line-height: 1.8; margin-bottom: 20px; text-shadow: 4px 4px 0 var(--gold), -1px -1px 0 var(--cyan); animation: bounce 1s infinite; cursor: pointer; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .health-bar { display: flex; gap: 4px; margin-bottom: 30px; }
    .heart { width: 20px; height: 20px; background: var(--magenta); clip-path: path('M10 4 C6 0 0 2 0 7 C0 12 10 18 10 18 C10 18 20 12 20 7 C20 2 14 0 10 4'); animation: beat 0.5s infinite; }
    .heart:nth-child(2) { animation-delay: 0.1s; } .heart:nth-child(3) { animation-delay: 0.2s; } .heart:nth-child(4) { animation-delay: 0.3s; } .heart:nth-child(5) { animation-delay: 0.4s; }
    @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    .pixel-menu { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 400px; width: 90%; }
    .menu-btn { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 20px 24px; background: rgba(0,255,255,0.05); border: 3px solid var(--cyan); color: var(--cyan); font-family: 'Press Start 2P', monospace; font-size: 10px; cursor: pointer; transition: all 0.1s; text-transform: uppercase; text-decoration: none; }
    .menu-btn:hover { background: var(--cyan); color: var(--bg); transform: translate(-4px, -4px); box-shadow: 8px 8px 0 var(--magenta); }
    .menu-btn.gold { border-color: var(--gold); color: var(--gold); }
    .menu-btn.gold:hover { background: var(--gold); color: var(--bg); box-shadow: 8px 8px 0 var(--cyan); }
    @keyframes floatPixel { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-30px) rotate(20deg); } }
    .player { position: fixed; font-size: 40px; cursor: pointer; z-index: 100; animation: idle 0.5s steps(2) infinite; pointer-events: none; }
    @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    .enemy { position: absolute; font-size: 30px; animation: enemyMove 4s linear infinite; cursor: pointer; transition: transform 0.2s; }
    .enemy:hover { transform: scale(1.3) rotate(20deg); }
    @keyframes enemyMove { 0% { left: -50px; } 100% { left: 110%; } }
    .hud { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; left: 0; right: 0; padding: 15px 20px; background: rgba(0,0,0,0.8); border-top: 3px solid var(--cyan); display: flex; justify-content: space-between; font-family: 'Press Start 2P', monospace; font-size: 10px; z-index: 100; }
    .hud-item { display: flex; align-items: center; gap: 8px; }
    .hud-label { color: var(--cyan); }
    .hud-value { color: var(--gold); }
    .score { position: fixed; top: 20px; right: 20px; z-index: 1000; top: 20px; right: 20px; font-family: 'Press Start 2P', monospace; font-size: 16px; color: var(--gold); text-shadow: 2px 2px 0 var(--magenta); z-index: 100; }
    .sparkle { position: absolute; width: 8px; height: 8px; background: var(--gold); pointer-events: none; animation: sparkle 0.5s forwards; }
    @keyframes sparkle { to { transform: translate(var(--tx), var(--ty)); opacity: 0; } }
  </style>
</head>
<body onload="document.body.style.opacity=1">
  <style>body{opacity:0;transition:opacity 0.5s} </style>
<body>
  <div class="pixel-bg"></div>
  <div class="score">SCORE: <span id="scoreVal">0000</span></div>
  <div class="game-world">
    <div class="pixel-logo">THEMACHINE CORP.<br><span style="font-size: 14px; color: var(--cyan);">8-BIT WORLD</span></div>
    <div class="health-bar"><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div><div class="heart"></div></div>
    <div class="pixel-menu">
      <a href="/persona/" class="menu-btn gold">🎭 Persona</a>
      <a href="/innervoice/" class="menu-btn">🔮 Voice</a>
      <a href="/lifemosaic/" class="menu-btn gold">🧩 Life</a>
      <a href="/tools.html" class="menu-btn">🧰 Tools</a>
      <a href="/predict.html" class="menu-btn">📊 Predict</a>
      <a href="/team.html" class="menu-btn gold">👥 Team</a>
    </div>
  </div>
  <div class="player" id="player">🤖</div>
  <div class="hud">
    <div class="hud-item"><span class="hud-label">HP</span><span class="hud-value">♥♥♥♥♥</span></div>
    <div class="hud-item"><span class="hud-label">AGENTS</span><span class="hud-value">5</span></div>
    <div class="hud-item"><span class="hud-label">LVL</span><span class="hud-value">99</span></div>
    <div class="hud-item"><span class="hud-label">GOLD</span><span class="hud-value">∞</span></div>
  </div>
  <script>
    const player = document.getElementById('player');
    document.addEventListener('mousemove', (e) => { player.style.left = (e.clientX - 20) + 'px'; player.style.top = (e.clientY - 20) + 'px'; });
    document.addEventListener('click', (e) => { if(e.target.tagName !== 'A') { createSparkle(e.clientX, e.clientY); incrementScore(); } });
    function createSparkle(x, y) { for (let i = 0; i < 8; i++) { const sparkle = document.createElement('div'); sparkle.className = 'sparkle'; sparkle.style.left = x + 'px'; sparkle.style.top = y + 'px'; sparkle.style.setProperty('--tx', (Math.random() - 0.5) * 100 + 'px'); sparkle.style.setProperty('--ty', (Math.random() - 0.5) * 100 + 'px'); sparkle.style.background = Math.random() > 0.5 ? '#d4af37' : '#00ffff'; document.body.appendChild(sparkle); setTimeout(() => sparkle.remove(), 500); } }
    let score = 0; function incrementScore() { score += 10; document.getElementById('scoreVal').textContent = score.toString().padStart(4, '0'); }
  </script>
</body>
</html>
