<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter | THEMATHINK</title>
  <style>
    :root { --bg: #0a0a0f; --text: #e5e7eb; --gold: #fbbf24; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { color: var(--gold); font-size: 42px; text-align: center; margin-bottom: 12px; }
    .subtitle { color: #666; text-align: center; margin-bottom: 40px; }
    .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .card h2 { color: var(--gold); font-size: 20px; margin-bottom: 12px; }
    .card p { color: #888; line-height: 1.6; }
    .tag { display: inline-block; background: #222; color: var(--gold); padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-right: 8px; }
    .form { background: #111; border: 1px solid #222; border-radius: 12px; padding: 32px; text-align: center; }
    input { width: 100%; max-width: 300px; padding: 14px; border: 1px solid #333; border-radius: 8px; background: #0a0a0f; color: #fff; font-size: 16px; margin-bottom: 12px; }
    button { background: var(--gold); color: #0a0a0f; border: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    a { color: var(--gold); }
    .back { position: fixed; top: 20px; left: 20px; }
    .back a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <div class="back"><a href="/">← Home</a></div>
  <div class="container">
    <h1>📰 Newsletter</h1>
    <p class="subtitle">Weekly insights on AI, philosophy, and self-discovery</p>
    
    <div class="card">
      <h2>What's Inside</h2>
      <p>• AI trends and insights<br>• Philosophy of thinking<br>• Product discovery frameworks<br>• Self-improvement methodologies</p>
    </div>
    
    <div class="card">
      <h2>Past Issues</h2>
      <p>Coming soon - archived newsletters will appear here</p>
    </div>
    
    <div class="form">
      <h2 style="margin-bottom: 20px;">Subscribe</h2>
      <input type="email" placeholder="your@email.com">
      <br>
      <button>Subscribe</button>
    </div>
  </div>
</body>
</html>
