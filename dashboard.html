<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMACHINE Corp. Dashboard</title>
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a24;
      --bg-hover: #222230;
      --accent: #fbbf24;
      --accent-dim: #b8860b;
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #555566;
      --border: #2a2a3a;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    
    h1 {
      font-size: 24px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    h1 span { color: var(--accent); }
    
    .nav {
      display: flex;
      gap: 8px;
    }
    
    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    .nav a:hover, .nav a.active {
      background: var(--bg-card);
      color: var(--accent);
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    
    .stat-card .label {
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .stat-card .value {
      font-size: 32px;
      font-weight: 700;
    }
    
    .stat-card.pending .value { color: var(--warning); }
    .stat-card.in_progress .value { color: var(--info); }
    .stat-card.done .value { color: var(--success); }
    .stat-card.total .value { color: var(--accent); }
    
    .stat-card .sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .agent-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s;
    }
    
    .agent-card:hover {
      border-color: var(--accent-dim);
      transform: translateY(-2px);
    }
    
    .agent-card .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .agent-card .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dim));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    .agent-card .info h3 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .agent-card .info p {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .agent-card .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    
    .agent-card .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .agent-card .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .agent-card .status-dot.idle { background: var(--text-muted); }
    
    .agent-card .tasks {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    
    .agent-card .task-count {
      text-align: center;
      padding: 8px;
      background: var(--bg-secondary);
      border-radius: 8px;
    }
    
    .agent-card .task-count .num {
      font-size: 18px;
      font-weight: 700;
    }
    
    .agent-card .task-count .lbl {
      font-size: 10px;
      color: var(--text-muted);
    }
    
    .agent-card .task-count.pending .num { color: var(--warning); }
    .agent-card .task-count.in_progress .num { color: var(--info); }
    .agent-card .task-count.done .num { color: var(--success); }
    
    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
    }
    
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    
    .panel-header h2 {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .panel-body {
      padding: 16px 20px;
    }
    
    .task-list {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      margin-bottom: 8px;
      transition: all 0.2s;
    }
    
    .task-item:hover {
      background: var(--bg-hover);
    }
    
    .task-item .priority {
      width: 4px;
      height: 40px;
      border-radius: 2px;
    }
    
    .task-item .priority.urgent { background: var(--danger); }
    .task-item .priority.high { background: var(--warning); }
    .task-item .priority.normal { background: var(--info); }
    .task-item .priority.low { background: var(--text-muted); }
    
    .task-item .content {
      flex: 1;
    }
    
    .task-item .title {
      font-weight: 500;
      margin-bottom: 4px;
    }
    
    .task-item .meta {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 12px;
    }
    
    .task-item .status-badge {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
    }
    
    .task-item .status-badge.pending { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .task-item .status-badge.in_progress { background: rgba(59, 130, 246, 0.2); color: var(--info); }
    .task-item .status-badge.done { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .task-item .status-badge.review { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
    .task-item .status-badge.escalated { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    
    .log-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    
    .log-item:last-child { border-bottom: none; }
    
    .log-item .time {
      color: var(--text-muted);
      font-size: 11px;
      min-width: 70px;
    }
    
    .log-item .agent {
      min-width: 60px;
      font-weight: 500;
    }
    
    .log-item .message {
      color: var(--text-secondary);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    input, select, textarea {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 0.2s;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    
    .btn-primary:hover {
      background: var(--accent-dim);
    }
    
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
    }
    
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .filters select {
      width: auto;
      min-width: 120px;
    }
    
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .refresh-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    @media (max-width: 1024px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 <span>THEMACHINE</span> Dashboard</h1>
      <nav class="nav">
        <a href="/" class="active">🏢 Office</a>
        <a href="/dashboard.html">📊 Dashboard</a>
      </nav>
    </header>
    
    <!-- Stats -->
    <div class="grid" id="stats">
      <div class="stat-card pending">
        <div class="label">待处理</div>
        <div class="value">-</div>
        <div class="sub">Pending</div>
      </div>
      <div class="stat-card in_progress">
        <div class="label">进行中</div>
        <div class="value">-</div>
        <div class="sub">In Progress</div>
      </div>
      <div class="stat-card done">
        <div class="label">已完成</div>
        <div class="value">-</div>
        <div class="sub">Done</div>
      </div>
      <div class="stat-card total">
        <div class="label">总计</div>
        <div class="value">-</div>
        <div class="sub">Total Tasks</div>
      </div>
    </div>
    
    <!-- Agents -->
    <h2 style="font-size: 18px; margin-bottom: 16px;">👥 Agent 状态</h2>
    <div class="agents-grid" id="agents">
      <div class="loading">加载中...</div>
    </div>
    
    <!-- Task Queue -->
    <div class="panel">
      <div class="panel-header">
        <h2>📋 任务队列</h2>
        <button class="refresh-btn" onclick="loadTasks()">🔄 刷新</button>
      </div>
      <div class="panel-body">
        <div class="filters">
          <select id="taskFilter" onchange="loadTasks()">
            <option value="">全部状态</option>
            <option value="pending">待处理</option>
            <option value="in_progress">进行中</option>
            <option value="review">审核中</option>
            <option value="done">已完成</option>
            <option value="escalated">已升级</option>
          </select>
          <select id="agentFilter" onchange="loadTasks()">
            <option value="">全部 Agent</option>
            <option value="ceo">CEO</option>
            <option value="cfo">CFO</option>
            <option value="cto">CTO</option>
            <option value="cmo">CMO</option>
            <option value="cpo">CPO</option>
            <option value="sec">SEC</option>
          </select>
        </div>
        <div class="task-list" id="taskList">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>
    
    <!-- Activity Logs -->
    <div class="panel">
      <div class="panel-header">
        <h2>📜 活动日志</h2>
        <button class="refresh-btn" onclick="loadLogs()">🔄 刷新</button>
      </div>
      <div class="panel-body">
        <div class="log-list" id="logList">
          <div class="loading">加载中...</div>
        </div>
      </div>
    </div>
    
    <!-- Create Task -->
    <div class="panel">
      <div class="panel-header">
        <h2>➕ 创建任务</h2>
      </div>
      <div class="panel-body">
        <form id="createTaskForm">
          <div class="form-row">
            <input type="text" id="taskTitle" placeholder="任务标题" required>
            <select id="taskAgent">
              <option value="">自动分配</option>
              <option value="ceo">CEO - THE MACHINE</option>
              <option value="cfo">CFO - Bill</option>
              <option value="cto">CTO - Alex</option>
              <option value="cmo">CMO - May</option>
              <option value="cpo">CPO - Peter</option>
              <option value="sec">SEC - David</option>
            </select>
          </div>
          <div class="form-row">
            <select id="taskPriority">
              <option value="normal">普通优先级</option>
              <option value="high">高优先级</option>
              <option value="urgent">紧急</option>
              <option value="low">低优先级</option>
            </select>
            <button type="submit" class="btn btn-primary">创建任务</button>
          </div>
          <textarea id="taskDesc" placeholder="任务描述（可选）"></textarea>
        </form>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = '';
    
    async function fetchJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.statusText);
      return res.json();
    }
    
    async function postJSON(url, data) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      if (!res.ok) throw new Error(res.statusText);
      return res.json();
    }
    
    // Load Stats
    async function loadStats() {
      try {
        const { stats } = await fetchJSON(`${API_BASE}/api/dashboard/stats`);
        
        document.querySelector('.stat-card.pending .value').textContent = stats.pending || 0;
        document.querySelector('.stat-card.in_progress .value').textContent = stats.in_progress || 0;
        document.querySelector('.stat-card.done .value').textContent = stats.done || 0;
        
        const total = (stats.pending || 0) + (stats.in_progress || 0) + (stats.review || 0) + (stats.done || 0);
        document.querySelector('.stat-card.total .value').textContent = total;
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }
    
    // Load Agents
    async function loadAgents() {
      try {
        const { agents } = await fetchJSON(`${API_BASE}/api/dashboard/agents`);
        
        const container = document.getElementById('agents');
        container.innerHTML = agents.map(agent => `
          <div class="agent-card">
            <div class="header">
              <div class="avatar">${agent.emoji || '🤖'}</div>
              <div class="info">
                <h3>${agent.name}</h3>
                <p>${agent.role}</p>
              </div>
            </div>
            <div class="status">
              <span class="status-dot ${agent.status}"></span>
              <span>${agent.status === 'active' ? '在线' : '空闲'}</span>
              ${agent.last_active ? `<span style="margin-left: auto; color: var(--text-muted); font-size: 11px;">${formatTime(agent.last_active)}</span>` : ''}
            </div>
            <div class="tasks">
              <div class="task-count pending">
                <div class="num">${agent.tasks?.pending || 0}</div>
                <div class="lbl">待处理</div>
              </div>
              <div class="task-count in_progress">
                <div class="num">${agent.tasks?.in_progress || 0}</div>
                <div class="lbl">进行中</div>
              </div>
              <div class="task-count done">
                <div class="num">${agent.tasks?.done || 0}</div>
                <div class="lbl">已完成</div>
              </div>
              <div class="task-count">
                <div class="num">${(agent.tasks?.pending || 0) + (agent.tasks?.in_progress || 0) + (agent.tasks?.done || 0)}</div>
                <div class="lbl">总计</div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load agents:', e);
        document.getElementById('agents').innerHTML = '<div class="empty">加载失败</div>';
      }
    }
    
    // Load Tasks
    async function loadTasks() {
      try {
        const status = document.getElementById('taskFilter').value;
        const agent = document.getElementById('agentFilter').value;
        
        let url = `${API_BASE}/api/dashboard/tasks?`;
        if (status) url += `status=${status}&`;
        if (agent) url += `agent=${agent}&`;
        
        const { tasks } = await fetchJSON(url);
        
        const container = document.getElementById('taskList');
        
        if (!tasks || tasks.length === 0) {
          container.innerHTML = '<div class="empty">暂无任务</div>';
          return;
        }
        
        container.innerHTML = tasks.map(task => `
          <div class="task-item">
            <div class="priority ${task.priority}"></div>
            <div class="content">
              <div class="title">${escapeHtml(task.title)}</div>
              <div class="meta">
                <span>${task.agent_emoji || ''} ${task.agent_name || task.assigned_agent_id}</span>
                <span>${formatTime(task.created_at)}</span>
              </div>
            </div>
            <span class="status-badge ${task.status}">${getStatusText(task.status)}</span>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load tasks:', e);
        document.getElementById('taskList').innerHTML = '<div class="empty">加载失败</div>';
      }
    }
    
    // Load Logs
    async function loadLogs() {
      try {
        const { logs } = await fetchJSON(`${API_BASE}/api/dashboard/logs?limit=30`);
        
        const container = document.getElementById('logList');
        
        if (!logs || logs.length === 0) {
          container.innerHTML = '<div class="empty">暂无日志</div>';
          return;
        }
        
        container.innerHTML = logs.map(log => `
          <div class="log-item">
            <span class="time">${formatTime(log.created_at)}</span>
            <span class="agent">${log.agent_emoji || ''} ${log.agent_name || log.agent_id}</span>
            <span class="message">${escapeHtml(log.message)}</span>
          </div>
        `).join('');
      } catch (e) {
        console.error('Failed to load logs:', e);
        document.getElementById('logList').innerHTML = '<div class="empty">加载失败</div>';
      }
    }
    
    // Create Task
    document.getElementById('createTaskForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const title = document.getElementById('taskTitle').value.trim();
      const description = document.getElementById('taskDesc').value.trim();
      const assigned_agent_id = document.getElementById('taskAgent').value;
      const priority = document.getElementById('taskPriority').value;
      
      if (!title) return;
      
      try {
        await postJSON(`${API_BASE}/api/dashboard/tasks`, {
          title,
          description,
          assigned_agent_id: assigned_agent_id || undefined,
          priority,
          source_agent_id: 'system'
        });
        
        // Reset form
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDesc').value = '';
        
        // Reload data
        loadStats();
        loadTasks();
        loadLogs();
        
        alert('任务创建成功！');
      } catch (e) {
        console.error('Failed to create task:', e);
        alert('创建失败: ' + e.message);
      }
    });
    
    // Utils
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }
    
    function formatTime(timeStr) {
      if (!timeStr) return '';
      const date = new Date(timeStr);
      const now = new Date();
      const diff = now - date;
      
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      
      return date.toLocaleDateString('zh-CN') + ' ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    }
    
    function getStatusText(status) {
      const map = {
        pending: '待处理',
        in_progress: '进行中',
        review: '审核中',
        done: '已完成',
        escalated: '已升级',
        rejected: '已拒绝'
      };
      return map[status] || status;
    }
    
    // Init
    loadStats();
    loadAgents();
    loadTasks();
    loadLogs();
    
    // Auto refresh
    setInterval(() => {
      loadStats();
      loadLogs();
    }, 30000);
  </script>
</body>
</html>
