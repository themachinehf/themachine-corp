<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | THEMACHINE Corp.</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --text: #e5e7eb;
      --gold: #fbbf24;
      --border: #1e293b;
      --font: 'Courier New', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--font); 
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; }
    
    header {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 120px;
      height: 2px;
      background: var(--gold);
    }
    h1 { font-size: 48px; color: var(--gold); margin-bottom: 12px; text-transform: uppercase; }
    .subtitle { color: #888; font-size: 14px; }
    
    nav {
      display: flex;
      gap: 30px;
      margin-top: 30px;
      flex-wrap: wrap;
    }
    nav a {
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--gold); }
    
    h2 { color: var(--gold); margin: 40px 0 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: #111827;
      border: 1px solid var(--border);
      padding: 30px;
      text-align: center;
    }
    .stat-card:hover { border-color: var(--gold); }
    .stat-num { font-size: 36px; color: var(--gold); }
    .stat-label { color: #888; font-size: 12px; margin-top: 8px; text-transform: uppercase; }
    
    .agents-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }
    .agent-card {
      background: #111827;
      border: 1px solid var(--border);
      padding: 20px;
    }
    .agent-card:hover { border-color: var(--gold); }
    .agent-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
    .status-active { background: #22c55e; }
    .status-idle { background: #6b7280; }
    .agent-name { color: var(--gold); font-size: 16px; }
    .agent-role { color: #60a5fa; font-size: 12px; }
    
    .task-list { max-height: 400px; overflow-y: auto; }
    .task-item {
      background: #111827;
      border: 1px solid var(--border);
      padding: 15px;
      margin: 8px 0;
    }
    .task-item:hover { border-color: var(--gold); }
    .task-title { color: var(--text); }
    .task-meta { color: #666; font-size: 12px; margin-top: 8px; }
    .priority-urgent { border-left: 3px solid #ef4444; }
    .priority-high { border-left: 3px solid #f59e0b; }
    .priority-normal { border-left: 3px solid #6b7280; }
    
    .footer { color: #666; font-size: 12px; margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Dashboard</h1>
      <p class="subtitle">THEMACHINE Corp. Real-time Status</p>
      <nav>
        <a href="/">Home</a>
        <a href="/office/">Live Office</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/themathink/">THEMATHINK</a>
        <a href="/account">Account</a>
      </nav>
    </header>
    
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="pending">-</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-num" id="in_progress">-</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card"><div class="stat-num" id="done">-</div><div class="stat-label">Done</div></div>
      <div class="stat-card"><div class="stat-num" id="agents">-</div><div class="stat-label">Agents</div></div>
    </div>
    
    <h2>🤖 Agents</h2>
    <div class="agents-grid" id="agents-list">Loading...</div>
    
    <h2>📋 Recent Tasks</h2>
    <div class="task-list" id="tasks-list">Loading...</div>
    
    <div class="footer" id="time"></div>
  </div>
  
  <script>
    const API = 'https://themachine-auth.jxs66.workers.dev';
    
    async function load() {
      try {
        const [stats, agents, tasks] = await Promise.all([
          fetch(API + '/api/dashboard/stats').then(r => r.json()),
          fetch(API + '/api/dashboard/agents').then(r => r.json()),
          fetch(API + '/api/dashboard/tasks').then(r => r.json())
        ]);
        
        document.getElementById('pending').textContent = stats.stats.pending;
        document.getElementById('in_progress').textContent = stats.stats.in_progress;
        document.getElementById('done').textContent = stats.stats.done;
        document.getElementById('agents').textContent = agents.agents.length;
        
        document.getElementById('agents-list').innerHTML = agents.agents.map(a => 
          '<div class="agent-card">' +
            '<span class="agent-status ' + (a.status === 'active' ? 'status-active' : 'status-idle') + '"></span>' +
            '<span class="agent-name">' + a.emoji + ' ' + a.name + '</span><br>' +
            '<span class="agent-role">' + a.role + '</span>' +
          '</div>'
        ).join('');
        
        document.getElementById('tasks-list').innerHTML = tasks.tasks.slice(0,10).map(t => 
          '<div class="task-item priority-' + t.priority + '">' +
            '<div class="task-title">' + t.title + '</div>' +
            '<div class="task-meta">' + t.status + ' | ' + t.assigned_agent_id + ' | ' + t.priority + '</div>' +
          '</div>'
        ).join('');
        
        document.getElementById('time').textContent = 'Updated: ' + new Date().toLocaleString();
      } catch(e) {
        document.getElementById('time').textContent = 'Error: ' + e.message;
      }
    }
    
    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
