<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Network | THEMACHINE Corp.</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --text: #e5e7eb;
      --gold: #fbbf24;
      --border: #1e293b;
      --card-bg: #111827;
      --accent: #10b981;
      --font: 'Courier New', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      font-family: var(--font); 
      min-height: 100vh;
      image-rendering: pixelated;
    }
    .container { 
      max-width: 1100px; 
      margin: 0 auto; 
      padding: 40px 20px; 
    }
    
    /* Header */
    header {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 120px;
      height: 2px;
      background: var(--gold);
    }
    h1 { 
      font-size: 36px; 
      color: var(--gold); 
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .subtitle { 
      font-size: 14px; 
      color: #6b7280;
      font-style: italic;
    }
    
    /* Navigation */
    .nav { 
      display: flex; 
      gap: 12px; 
      margin-bottom: 40px; 
      flex-wrap: wrap; 
      justify-content: center;
      padding: 15px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .nav a { 
      color: var(--gold); 
      text-decoration: none; 
      padding: 10px 20px; 
      border: 2px solid var(--gold);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.1s;
    }
    .nav a:hover { 
      background: var(--gold); 
      color: var(--bg); 
    }
    
    /* Search Bar */
    .search-container {
      margin-bottom: 30px;
    }
    .search-bar {
      width: 100%;
      padding: 15px 20px;
      background: var(--card-bg);
      border: 2px solid var(--border);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-bar:focus {
      border-color: var(--gold);
    }
    .search-bar::placeholder {
      color: #6b7280;
    }
    
    /* Tags */
    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }
    .tag {
      padding: 6px 14px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: #9ca3af;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tag:hover, .tag.active {
      border-color: var(--gold);
      color: var(--gold);
    }
    
    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      text-align: center;
    }
    .stat-number {
      font-size: 32px;
      color: var(--gold);
      display: block;
      margin-bottom: 5px;
    }
    .stat-label {
      font-size: 12px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* Leaderboard */
    .leaderboard {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      margin-bottom: 40px;
    }
    .leaderboard h2 {
      font-size: 18px;
      color: var(--gold);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .leader-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .leader-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .leader-rank {
      font-size: 18px;
      color: var(--gold);
      width: 30px;
    }
    .leader-avatar {
      width: 32px;
      height: 32px;
      background: var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .leader-name {
      flex: 1;
      font-size: 14px;
    }
    .leader-score {
      color: var(--accent);
      font-size: 14px;
    }
    
    /* Knowledge Cards */
    .knowledge-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .knowledge-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 20px;
      transition: all 0.2s;
      cursor: pointer;
    }
    .knowledge-card:hover {
      border-color: var(--gold);
      transform: translateY(-2px);
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 16px;
      color: var(--text);
      font-weight: bold;
    }
    .card-tag {
      font-size: 10px;
      padding: 3px 8px;
      background: var(--bg);
      border: 1px solid var(--accent);
      color: var(--accent);
      text-transform: uppercase;
    }
    .card-desc {
      font-size: 13px;
      color: #9ca3af;
      line-height: 1.6;
      margin-bottom: 15px;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6b7280;
    }
    .card-author {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      overflow-y: auto;
    }
    .modal.active {
      display: block;
    }
    .modal-content {
      max-width: 700px;
      margin: 50px auto;
      background: var(--card-bg);
      border: 2px solid var(--gold);
      padding: 30px;
    }
    .modal-close {
      float: right;
      font-size: 24px;
      color: #6b7280;
      cursor: pointer;
    }
    .modal-close:hover {
      color: var(--gold);
    }
    .modal-title {
      font-size: 24px;
      color: var(--gold);
      margin-bottom: 20px;
    }
    .modal-body {
      color: var(--text);
      line-height: 1.8;
      font-size: 14px;
    }
    .modal-tags {
      display: flex;
      gap: 8px;
      margin: 15px 0;
    }
    .modal-tag {
      font-size: 11px;
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: #9ca3af;
    }
    .modal-meta {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: #6b7280;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .empty-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    @media (max-width: 768px) {
      .stats { grid-template-columns: 1fr; }
      .knowledge-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

    <!-- Tags -->

    <!-- Leaderboard -->
    <div class="leaderboard">

    <!-- Knowledge Cards -->

    </div>
  </div>

        content: `## 开发指南

### 基础功能
- 消息发送/编辑
- 频道管理

    // All unique tags
    const allTags = [...new Set(knowledgeData.flatMap(k => k.tags))];
    
    // Contributor stats
    const contributors = {};
    knowledgeData.forEach(k => {
      contributors[k.author] = (contributors[k.author] || 0) + 1;
    });
    const sortedContributors = Object.entries(contributors)
      .sort((a, b) => b[1] - a[1]);
    
    // State
    let activeTag = 'all';
    let searchQuery = '';
    
    // Initialize
    function init() {
      // Stats
      document.getElementById('totalCards').textContent = knowledgeData.length;
      document.getElementById('totalTags').textContent = allTags.length;
      document.getElementById('totalContributors').textContent = Object.keys(contributors).length;
      
      // Tags
      const tagsContainer = document.getElementById('tagsContainer');
      allTags.forEach(tag => {
        const tagEl = document.createElement('span');
        tagEl.className = 'tag';
        tagEl.dataset.tag = tag;
        tagEl.textContent = tag;
        tagEl.onclick = () => filterByTag(tag);
        tagsContainer.appendChild(tagEl);
      });
      
      // Leaderboard
      const leaderboard = document.getElementById('leaderboard');
      sortedContributors.forEach(([name, score], index) => {
        const avatar = name.charAt(0);
        const item = document.createElement('div');
        item.className = 'leader-item';
        item.innerHTML = `
          <span class="leader-rank">#${index + 1}</span>
          <div class="leader-avatar">${avatar}</div>
          <span class="leader-name">${name}</span>
          <span class="leader-score">${score} 条</span>
        `;
        leaderboard.appendChild(item);
      });
      
      // Render cards
      renderCards();
      
      // Search
      document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderCards();
      });
    }
    
    function filterByTag(tag) {
      activeTag = tag;
      document.querySelectorAll('.tag').forEach(t => {
        t.classList.toggle('active', t.dataset.tag === tag);
      });
      renderCards();
    }
    
    function renderCards() {
      const grid = document.getElementById('knowledgeGrid');
      grid.innerHTML = '';
      
      const filtered = knowledgeData.filter(k => {
        const matchTag = activeTag === 'all' || k.tags.includes(activeTag);
        const matchSearch = !searchQuery || 
          k.title.toLowerCase().includes(searchQuery) ||
          k.desc.toLowerCase().includes(searchQuery) ||
          k.tags.some(t => t.toLowerCase().includes(searchQuery));
        return matchTag && matchSearch;
      });
      
      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <div class="empty-icon">🔍</div>
            <p>没有找到相关知识</p>
          </div>
        `;
        return;
      }
      
      filtered.forEach(k => {
        const card = document.createElement('div');
        card.className = 'knowledge-card';
        card.onclick = () => openModal(k);
        card.innerHTML = `
          <div class="card-header">
            <span class="card-title">${k.title}</span>
            <span class="card-tag">${k.tags[0]}</span>
          </div>
          <p class="card-desc">${k.desc}</p>
          <div class="card-meta">
            <span class="card-author">👤 ${k.author}</span>
            <span>📅 ${k.date}</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }
    
    function openModal(k) {
      document.getElementById('modalTitle').textContent = k.title;
      document.getElementById('modalTags').innerHTML = k.tags.map(t => `<span class="modal-tag">${t}</span>`).join('');
      document.getElementById('modalBody').innerHTML = k.content.replace(/\n/g, '<br>');
      document.getElementById('modalMeta').innerHTML = `👤 作者: ${k.author} | 📅 更新时间: ${k.date}`;
      document.getElementById('modal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    // Close modal on outside click
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    
    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    
    init();
  </script>
</body>
