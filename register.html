<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - THEMACHINE Corp.</title>
  <style>
    :root { --bg: #0a0a0f; --text: #e5e7eb; --gold: #fbbf24; --border: #1e293b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .container { width: 100%; max-width: 400px; }
    h1 { color: var(--gold); font-size: 24px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; text-align: center; }
    .form { background: rgba(255,255,255,0.03); border: 2px solid var(--border); padding: 40px; border-radius: 8px; }
    .form h2 { font-size: 14px; letter-spacing: 2px; margin-bottom: 30px; text-transform: uppercase; }
    input { width: 100%; padding: 14px; background: var(--bg); border: 2px solid var(--border); color: var(--text); font-family: inherit; margin-bottom: 20px; border-radius: 4px; }
    input:focus { outline: none; border-color: var(--gold); }
    button { width: 100%; padding: 14px; background: var(--gold); color: var(--bg); border: none; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #fcd34d; }
    .link { text-align: center; margin-top: 20px; font-size: 14px; }
    .link a { color: var(--gold); text-decoration: none; }
    .error { color: #ef4444; text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>THEMACHINE</h1>
    <div class="form">
      <h2>Register</h2>
      <div id="error" class="error"></div>
      <form id="registerForm">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirm" placeholder="Confirm Password" required>
        <button type="submit" id="btn">Register</button>
      </form>
      <p class="link">Has account? <a href="/login.html">Login</a></p>
      <p class="link"><a href="/">← Back to Home</a></p>
    </div>
  </div>
  <script>
    // Check if already logged in
    const sessionId = localStorage.getItem('sessionId');
    if (sessionId) {
      window.location.href = '/account.html';
    }

    document.getElementById('registerForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const error = document.getElementById('error');
      error.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Registering...';
      
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      
      if (password !== confirm) {
        error.textContent = 'Passwords do not match!';
        btn.disabled = false;
        btn.textContent = 'Register';
        return;
      }
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      try {
        const res = await fetch('https://themachine-auth.jxs66.workers.dev/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (data.success) {
          localStorage.setItem('user', JSON.stringify(data.user));
          localStorage.setItem('sessionId', data.sessionId);
          window.location.href = '/account.html';
        } else {
          error.textContent = data.error || 'Registration failed';
        }
      } catch (err) {
        error.textContent = 'Connection error. Please try again.';
      }
      
      btn.disabled = false;
      btn.textContent = 'Register';
    };
  </script>
</body>
</html>
