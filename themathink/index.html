<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Check if logged in - redirect to login if not
    const sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
      window.location.href = '/login.html';
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMATHINK - Find Your Own Answers</title>
  <style>
    :root { --bg: #0a0a0f; --text: #e5e7eb; --gold: #fbbf24; --border: #1e293b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; display: flex; }
    
    .sidebar { width: 280px; background: linear-gradient(180deg, #0f0f14 0%, #0a0a0f 100%); border-right: 2px solid var(--border); padding: 30px 20px; display: flex; flex-direction: column; }
    .sidebar h2 { color: var(--gold); font-size: 12px; letter-spacing: 3px; margin-bottom: 25px; text-transform: uppercase; }
    .new-btn { background: linear-gradient(135deg, var(--gold) 0%, #f59e0b 100%); color: var(--bg); border: none; padding: 14px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; border-radius: 4px; }
    .new-btn:hover { transform: translateY(-2px); }
    
    .mode-select { margin-bottom: 25px; }
    .mode-select label { display: block; font-size: 11px; color: #6b7280; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; }
    .mode-select select { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); color: var(--text); border-radius: 4px; }
    
    .session-list { flex: 1; overflow-y: auto; }
    .session-item { padding: 14px 12px; border: 1px solid var(--border); margin-bottom: 10px; cursor: pointer; font-size: 13px; border-radius: 4px; }
    .session-item:hover { border-color: var(--gold); }
    .session-item.active { border-color: var(--gold); background: rgba(251,191,36,0.1); }
    
    .main { flex: 1; display: flex; flex-direction: column; padding: 40px 60px; max-width: 900px; margin: 0 auto; }
    .main h1 { color: var(--gold); font-size: 28px; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 12px; }
    .tagline { color: #9ca3af; font-size: 14px; margin-bottom: 40px; border-left: 3px solid var(--gold); padding-left: 16px; }
    #chat { flex: 1; overflow-y: auto; border: 2px solid var(--border); padding: 30px; margin-bottom: 30px; border-radius: 8px; background: rgba(255,255,255,0.02); }
    .message { margin-bottom: 24px; padding: 16px 20px; max-width: 85%; border-radius: 6px; line-height: 1.6; }
    .user { background: rgba(251,191,36,0.08); margin-left: auto; border-left: 3px solid var(--gold); }
    .ai { background: rgba(255,255,255,0.03); border-left: 3px solid #fbbf24; }
    .input-area { display: flex; gap: 15px; }
    input { flex: 1; padding: 18px 24px; background: rgba(255,255,255,0.03); border: 2px solid var(--border); color: var(--text); font-family: inherit; font-size: 14px; border-radius: 4px; }
    input:focus { outline: none; border-color: var(--gold); }
    button { padding: 18px 36px; background: linear-gradient(135deg, var(--gold) 0%, #f59e0b 100%); color: var(--bg); border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; border-radius: 4px; }
    button:hover { transform: translateY(-2px); }
    button:disabled { opacity: 0.5; }
    
    .user-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .user-info { color: #6b7280; font-size: 14px; }
    .logout-btn { background: transparent; border: 1px solid var(--border); color: #6b7280; padding: 8px 16px; font-size: 12px; }
    
    @media (max-width: 768px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--border); }
      .main { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Think</h2>
    <button class="new-btn" onclick="toggleNewInput()">+ New Session</button>
    <input type="text" id="newTitle" placeholder="What to think about?" style="display:none;width:100%;padding:12px;background:rgba(255,255,255,0.03);border:2px solid var(--border);color:var(--text);margin-bottom:20px;border-radius:4px;" onkeypress="handleNewEnter(event)">
    <div class="mode-select">
      <label>Philosophy Mode</label>
      <select id="mode">
        <option value="socratic">Socratic (default)</option>
        <option value="stoic">Stoic - practical</option>
        <option value="zen">Zen - minimal</option>
      </select>
    </div>
    <h2>History</h2>
    <button class="export-btn" onclick="exportSession()" style="background:transparent;border:1px solid var(--gold);color:var(--gold);padding:10px;cursor:pointer;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-bottom:15px;width:100%;border-radius:4px;">Export Session</button>
    <div class="session-list" id="sessions"></div>
  </div>
  
  <div class="main">
    <div class="user-bar">
      <div class="user-info" id="userInfo">Guest Mode</div>
      <button class="logout-btn" onclick="goToAccount()">Account</button>
    </div>
        
    <h1>THEMATHINK</h1>
    <p class="tagline">We don't help. We help you find your own.</p>
    <div id="chat"></div>
    <div class="input-area">
      <input type="text" id="msg" placeholder="Share what's on your mind..." />
      <button id="send" onclick="send()">Ask</button>
    </div>
  </div>

  <script>
    const API = 'https://themachine-auth.jxs66.workers.dev';
    let currentSession = null;
    let sessions = [];
    let user = JSON.parse(localStorage.getItem('user') || 'null');
    
    // Show user info
    if (user) {
      document.getElementById('userInfo').textContent = user.email || 'Logged in';
    }
    
    function goToAccount() {
      window.location.href = '/account.html';
    }
    
    function toggleNewInput() {
      const input = document.getElementById('newTitle');
      input.style.display = input.style.display === 'none' ? 'block' : 'none';
      if (input.style.display === 'block') input.focus();
    }
    
    function handleNewEnter(e) {
      if (e.key === 'Enter') createSession();
    }
    
    async function createSession() {
      const title = document.getElementById('newTitle').value.trim() || 'New Thought';
      try {
        const res = await fetch(API + '/api/auth/session', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({title})
        });
        const data = await res.json();
        currentSession = data.session.id;
        document.getElementById('chat').innerHTML = '';
        document.getElementById('newTitle').value = '';
        document.getElementById('newTitle').style.display = 'none';
        loadSessions();
      } catch(e) { alert('Error creating session'); }
    }
    
    async function loadSessions() {
      try {
        const sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
          sessions = [];
          return;
        }
        const res = await fetch(API + '/api/auth/session', {
          headers: { 'x-session-id': sessionId }
        });
        if (!res.ok) {
          sessions = [];
          return;
        }
        const data = await res.json();
        // For now, just show empty - sessions are stored locally
        sessions = [];
        renderSessions();
      } catch(e) { 
        console.log(e); 
        sessions = [];
        renderSessions();
      }
    }
    
    function renderSessions() {
      const list = document.getElementById('sessions');
      list.innerHTML = sessions.map(s => 
        `<div class="session-item ${s.id === currentSession ? 'active' : ''}" onclick="loadSession('${s.id}')">${s.title}</div>`
      ).join('') || '<div style="color:#6b7280;font-size:12px;">No sessions yet</div>';
    }
    
    async function loadSession(id) {
      currentSession = id;
      renderSessions();
      try {
        const res = await fetch(API + '/api/auth/session/' + id);
        const data = await res.json();
        const chat = document.getElementById('chat');
        chat.innerHTML = '';
        (data.messages || []).forEach(m => addMessage(m.content, m.role === 'user'));
      } catch(e) {}
    }
    
    async function exportSession() {
      if (!currentSession) {
        alert('No session selected');
        return;
      }
      try {
        const res = await fetch(API + '/api/auth/session/' + currentSession);
        const data = await res.json();
        const session = sessions.find(s => s.id === currentSession);
        const title = session ? session.title : 'Session';
        
        let text = 'THEMATHINK - ' + title + '\n';
        text += '='.repeat(50) + '\n\n';
        
        (data.messages || []).forEach(m => {
          const role = m.role === 'user' ? 'You' : 'THEMATHINK';
          text += '[' + role + ']\n' + m.content + '\n\n';
        });
        
        text += '-'.repeat(50) + '\n';
        text += 'Exported from THEMATHINK\n';
        text += 'We help you find your own answers.\n';
        
        const blob = new Blob([text], {type: 'text/plain'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = title.replace(/[^a-z0-9]/gi, '_').substring(0, 50) + '.txt';
        a.click();
        URL.revokeObjectURL(url);
      } catch(e) {
        alert('Error exporting session');
      }
    }
    
    function addMessage(text, isUser) {
      const div = document.createElement('div');
      div.className = 'message ' + (isUser ? 'user' : 'ai');
      div.textContent = (isUser ? 'You: ' : 'THEMATHINK: ') + text;
      document.getElementById('chat').appendChild(div);
      document.getElementById('chat').scrollTop = 9999;
    }
    
    async function send() {
      const text = document.getElementById('msg').value.trim();
      if (!text) return;
      
      // 检查每日限制 (localStorage)
      const today = new Date().toISOString().split('T')[0];
      let usage = JSON.parse(localStorage.getItem('daily_usage') || '{}');
      if (usage.date !== today) usage = { date: today, count: 0 };
      
      if (usage.count >= 5) {
        alert('You\'ve used your 5 free thoughts today. Upgrade to PRO for unlimited!');
        return;
      }
      
      addMessage(text, true);
      document.getElementById('msg').value = '';
      document.getElementById('send').disabled = true;
      
      // 更新使用计数
      usage.count++;
      localStorage.setItem('daily_usage', JSON.stringify(usage));
      
      try {
        const mode = document.getElementById('mode').value;
        const body = { message: text, mode };
        if (currentSession) body.session_id = currentSession;
        
        const sessionId = localStorage.getItem('sessionId');
        
        const res = await fetch(API + '/api/auth/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(body)
        });
        const data = await res.json();
        
        if (data.error) {
          addMessage(data.error, false);
        } else {
          if (data.session_id && !currentSession) {
            currentSession = data.session_id;
            loadSessions();
          }
          addMessage(data.reply || "I'm here to help you think.", false);
        }
      } catch(e) {
        addMessage("I'm having trouble thinking right now.", false);
      }
      document.getElementById('send').disabled = false;
    }
    
    document.getElementById('msg').addEventListener('keypress', e => { if(e.key === 'Enter') send(); });
    
    loadSessions();
    addMessage("I'm here. Not to give you answers. To help you find your own. What's on your mind?", false);
  </script>
</body>
</html>
