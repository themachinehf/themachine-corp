<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>THEMACHINE Dashboard</title>
  <style>
    :root { --bg: #0a0a0f; --text: #e5e7eb; --gold: #fbbf24; --border: #1e293b; }
    body { background: var(--bg); color: var(--text); font-family: monospace; padding: 40px; max-width: 1200px; margin: 0 auto; }
    h1 { color: var(--gold); margin-bottom: 30px; }
    h2 { color: var(--gold); margin: 30px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .card { background: #111827; border: 2px solid var(--border); padding: 20px; text-align: center; }
    .card:hover { border-color: var(--gold); }
    .stat { font-size: 36px; color: var(--gold); }
    .label { color: #888; margin-top: 8px; font-size: 14px; }
    .agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .agent-card { background: #111827; border: 2px solid var(--border); padding: 15px; }
    .agent-name { color: var(--gold); font-size: 18px; }
    .agent-role { color: #60a5fa; font-size: 12px; }
    .agent-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; }
    .status-active { background: #22c55e; }
    .status-idle { background: #6b7280; }
    .task-list { max-height: 300px; overflow-y: auto; }
    .task-item { background: #111827; border: 1px solid var(--border); padding: 10px; margin: 5px 0; }
    .task-title { color: var(--text); }
    .task-meta { color: #666; font-size: 12px; margin-top: 5px; }
    .priority-urgent { border-left: 3px solid #ef4444; }
    .priority-high { border-left: 3px solid #f59e0b; }
    .priority-normal { border-left: 3px solid #6b7280; }
    .time { color: #666; font-size: 12px; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
  <h1>📊 THEMACHINE Dashboard</h1>
  
  <div class="grid">
    <div class="card"><div class="stat" id="pending">-</div><div class="label">Pending</div></div>
    <div class="card"><div class="stat" id="in_progress">-</div><div class="label">In Progress</div></div>
    <div class="card"><div class="stat" id="done">-</div><div class="label">Done</div></div>
    <div class="card"><div class="stat" id="agents">-</div><div class="label">Agents</div></div>
  </div>
  
  <h2>🤖 Agents</h2>
  <div class="agent-grid" id="agents-list">Loading...</div>
  
  <h2>📋 Recent Tasks</h2>
  <div class="task-list" id="tasks-list">Loading...</div>
  
  <div class="time" id="time"></div>
  
  <script>
    const API = 'https://themachine-auth.jxs66.workers.dev';
    
    async function load() {
      try {
        const [stats, agents, tasks] = await Promise.all([
          fetch(API + '/api/dashboard/stats').then(r => r.json()),
          fetch(API + '/api/dashboard/agents').then(r => r.json()),
          fetch(API + '/api/dashboard/tasks').then(r => r.json())
        ]);
        
        // Stats
        document.getElementById('pending').textContent = stats.stats.pending;
        document.getElementById('in_progress').textContent = stats.stats.in_progress;
        document.getElementById('done').textContent = stats.stats.done;
        document.getElementById('agents').textContent = agents.agents.length;
        
        // Agents
        document.getElementById('agents-list').innerHTML = agents.agents.map(a => 
          '<div class="agent-card">' +
            '<span class="agent-status ' + (a.status === 'active' ? 'status-active' : 'status-idle') + '"></span>' +
            '<span class="agent-name">' + a.emoji + ' ' + a.name + '</span><br>' +
            '<span class="agent-role">' + a.role + '</span>' +
          '</div>'
        ).join('');
        
        // Tasks
        document.getElementById('tasks-list').innerHTML = tasks.tasks.slice(0,10).map(t => 
          '<div class="task-item priority-' + t.priority + '">' +
            '<div class="task-title">' + t.title + '</div>' +
            '<div class="task-meta">' + t.status + ' | ' + t.assigned_agent_id + ' | ' + t.priority + '</div>' +
          '</div>'
        ).join('');
        
        document.getElementById('time').textContent = 'Updated: ' + new Date().toLocaleTimeString();
      } catch(e) {
        document.getElementById('time').textContent = 'Error: ' + e.message;
      }
    }
    
    load();
    setInterval(load, 10000);
  </script>
</body>
</html>
