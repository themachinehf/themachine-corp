name: Daily Radar Scan
on:
  schedule:
    - cron: '0 3 * * *'  # 每日 11:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan HN
        id: hn
        run: |
          HN_IDS=$(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" | jq '.[:10]')
          echo "hn_ids=$HN_IDS" >> $GITHUB_OUTPUT
          for id in $(echo $HN_IDS | jq -r '.[]'); do
            title=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.title')
            score=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.score')
            url=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.url')
            echo "📰 HN: $title ($score pts)"
          done
      
      - name: Scan GitHub
        run: |
          curl -s "https://api.github.com/search/repositories?q=created:>2024-01-01&sort=stars&per_page=5" | \
          jq '.items[:5] | .[] | "⭐ \(.full_name): \(.description // "No description")"' 
      
      - name: Scan HuggingFace
        run: |
          echo "📄 HuggingFace Papers:"
          curl -s "https://huggingface.co/api/papers/trending?limit=5" | \
          jq -r '.[] | "\(.title)"' | head -5
      
      - name: Create Task in DB
        run: |
          # 通过 API 创建任务
          curl -s -X POST "https://themachine-auth.jxs66.workers.dev/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "Radar 扫描完成 - 需分析今日趋势",
              "description": "检查 HN/GitHub/HF 今日热门，识别新痛点",
              "priority": "normal",
              "assigned_agent_id": "cmo"
            }'
          echo "✅ 任务已创建"
      
      - name: Discord Notification
        if: env.DISCORD_WEBHOOK != ''
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{
              "content": "🔍 Radar 扫描完成！\n\n📰 HN / ⭐ GitHub / 📄 HF 已扫描\n✅ 任务已分配给 CMO"
            }'
      
      - name: Commit scan log
        run: |
          echo "$(date): Radar scan completed" >> radar-scan.log
          git config --local user.email "themachine@ai"
          git config --local user.name "Radar Bot"
          git add radar-scan.log
          git diff --staged --quiet || git commit -m "Radar scan $(date +%Y-%m-%d)" && git push
