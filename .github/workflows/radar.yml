name: Daily Radar Scan
on:
  schedule:
    - cron: '0 3 * * *'  # 每日 11:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan HN
        run: |
          echo "=== HN Trending ===" 
          curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" | head -c 500
      
      - name: Scan GitHub
        run: |
          echo "=== GitHub Trending ==="
          curl -s "https://api.github.com/search/repositories?q=created:>2024-01-01&sort=stars&per_page=10" | jq '.items[:3] | .[] | .full_name + " - " + .description'
      
      - name: Scan HF
        run: |
          echo "=== HuggingFace Papers ==="
          curl -s "https://huggingface.co/api/papers/trending?limit=5" | jq '.[:3] | .[] | .title'
      
      - name: Commit results
        run: |
          git config --local user.email "themachine@ai"
          git config --local user.name "Radar Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Radar scan $(date +%Y-%m-%d)"
          git push
