name: Daily Radar Scan
on:
  schedule:
    - cron: '0 3 * * *'  # 每日 11:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan HN
        run: |
          echo "=== 📰 HN Top 10 ==="
          for id in $(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" | jq '.[:10]' | jq -r '.[]'); do
            title=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.title // "N/A"')
            score=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.score // 0')
            echo "📰 [$score] $title"
          done
      
      - name: Scan GitHub
        run: |
          echo "=== ⭐ GitHub ==="
          curl -s "https://api.github.com/search/repositories?q=created:>2024-01-01&sort=stars&per_page=5" | \
          jq -r '.items[:5] | .[] | "⭐ \(.full_name): \((.description // "N/A")[0:60])"'
      
      - name: Scan HF
        run: |
          echo "=== 📄 HuggingFace ==="
          curl -s "https://huggingface.co/api/papers/trending?limit=5" | \
          jq -r '.[] | "📄 \((.title // "N/A")[0:60])"' | head -5
      
      - name: Create Analysis Tasks
        run: |
          # CMO: 市场分析
          curl -s -X POST "$API/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[Radar] 市场需求分析",
              "description": "分析今日 HN/GitHub/HF 热门内容，识别用户痛点和市场需求，形成提案供团队讨论",
              "priority": "high",
              "assigned_agent_id": "cmo",
              "source_type": "radar"
            }'
          
          # CFO: 变现机会
          curl -s -X POST "$API/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[Radar] 变现机会分析",
              "description": "扫描技术趋势，识别可变现的产品/服务机会，形成提案供团队讨论",
              "priority": "high",
              "assigned_agent_id": "cfo",
              "source_type": "radar"
            }'
          
          # CTO: 技术分析
          curl -s -X POST "$API/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[Radar] 技术趋势分析",
              "description": "分析新技术/框架，评估技术选型和实现方案，形成提案供团队讨论",
              "priority": "high",
              "assigned_agent_id": "cto",
              "source_type": "radar"
            }'
          
          echo "✅ 3个分析任务已创建"

      - name: Commit log
        run: |
          echo "$(date): Radar scan - 3 analysis tasks created" >> radar-scan.log
          git config --local user.email "themachine@ai"
          git config --local user.name "Radar Bot"
          git add radar-scan.log
          git diff --staged --quiet || git commit -m "Radar scan $(date +%Y-%m-%d)" && git push

  team-discussion:
    needs: scan
    runs-on: ubuntu-latest
    # 每周三和周六自动触发团队讨论
    schedule:
      - cron: '0 4 * * 3,6'
    steps:
      - name: Check & Trigger Discussion
        run: |
          # 检查分析任务是否都完成
          TASKS=$(curl -s "$API/api/tasks?status=pending" | jq '.tasks | length')
          if [ "$TASKS" -eq 0 ]; then
            echo "✅ 分析任务已完成，触发团队讨论..."
            
            # 创建讨论任务
            curl -s -X POST "$API/api/tasks" \
              -H "Content-Type: application/json" \
              -d '{
                "title": "[Team] 团队讨论会",
                "description": "CMO/CFO/CTO 汇报 Radar 分析结果，讨论可行项目，CEO 决策下一步工作",
                "priority": "urgent",
                "assigned_agent_id": "ceo",
                "source_type": "workflow"
              }'
            echo "✅ 讨论任务已创建"
          else
            echo "⏳ 还有 $TASKS 个任务待完成，跳过讨论"
          fi
