name: Daily Radar Scan
on:
  schedule:
    - cron: '0 3 * * *'  # 每日 11:00 UTC
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Scan HN
        id: hn
        run: |
          echo "=== 📰 HN Top 10 ==="
          HN_IDS=$(curl -s "https://hacker-news.firebaseio.com/v0/topstories.json" | jq '.[:10]')
          for id in $(echo $HN_IDS | jq -r '.[]'); do
            title=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.title // empty')
            score=$(curl -s "https://hacker-news.firebaseio.com/v0/item/$id.json" | jq -r '.score // 0')
            echo "📰 $title ($score pts)"
          done
      
      - name: Scan GitHub
        run: |
          echo "=== ⭐ GitHub Trending ==="
          curl -s "https://api.github.com/search/repositories?q=created:>2024-01-01&sort=stars&per_page=5" | \
          jq -r '.items[:5] | .[] | "⭐ \(.full_name): \(.description // "No description")[0:80]"' 
      
      - name: Scan HuggingFace
        run: |
          echo "=== 📄 HF Papers ==="
          curl -s "https://huggingface.co/api/papers/trending?limit=5" | \
          jq -r '.[] | "📄 \(.title)[0:60]"' | head -5
      
      - name: Analyze & Create Tasks
        run: |
          # 创建多个任务 - 按类型分配
          
          # CMO: 市场/需求类
          curl -s -X POST "https://themachine-auth.jxs66.workers.dev/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[Radar] 今日热门需求分析",
              "description": "分析 HN/GitHub/HF 今日热门，识别潜在市场需求",
              "priority": "high",
              "assigned_agent_id": "cmo"
            }'
          
          # CFO: 变现机会
          curl -s -X POST "https://themachine-auth.jxs66.workers.dev/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[Radar] 今日变现机会",
              "description": "扫描技术趋势，识别付费需求机会",
              "priority": "normal",
              "assigned_agent_id": "cfo"
            }'
          
          # CTO: 技术选型
          curl -s -X POST "https://themachine-auth.jxs66.workers.dev/api/tasks" \
            -H "Content-Type: application/json" \
            -d '{
              "title": "[Radar] 今日技术趋势",
              "description": "关注新技术/框架，评估技术选型",
              "priority": "normal",
              "assigned_agent_id": "cto"
            }'
          
          echo "✅ 3个任务已创建 (CMO, CFO, CTO)"
      
      - name: Commit log
        run: |
          echo "$(date): Radar scan completed - 3 tasks created" >> radar-scan.log
          git config --local user.email "themachine@ai"
          git config --local user.name "Radar Bot"
          git add radar-scan.log
          git diff --staged --quiet || git commit -m "Radar scan $(date +%Y-%m-%d)" && git push
