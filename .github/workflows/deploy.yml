name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        env:
          ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import os, json, hashlib, subprocess, urllib.request, urllib.error

          account_id = os.environ["ACCOUNT_ID"]
          token = os.environ["TOKEN"]
          hf = {"Authorization": f"Bearer {token}"}
          project = "themachine-corp"

          # Build manifest
          manifest = {}
          skip = {".git", "node_modules", ".github", "workers", ".venv", "__pycache__"}
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in skip]
              for f in files:
                  if f.endswith(".bak"):
                      continue
                  path = os.path.join(root, f)
                  name = path[2:]
                  try:
                      with open(path, "rb") as fp:
                          h = hashlib.sha256(fp.read()).hexdigest()
                      manifest[name] = h
                  except:
                      pass

          print(f"Manifest: {len(manifest)} files")

          # Create deployment with manifest
          manifest_json = json.dumps(manifest)
          result = subprocess.run([
              "curl", "-s", "--noproxy", "*", "-X", "POST",
              f"https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/{project}/deployments",
              "-H", f"Authorization: Bearer {token}",
              "-F", "branch=main",
              "-F", f"manifest={manifest_json};type=application/json"
          ], capture_output=True, text=True)

          resp = json.loads(result.stdout)
          if not resp.get("success"):
              print("Error creating deployment:", resp.get("errors"))
              exit(1)

          dep = resp["result"]
          dep_id = dep["id"]
          upload_url = dep.get("upload_url", "")
          print(f"Deployment created: {dep_id}")
          print(f"URL: https://{dep_id[:8]}.themachine-corp-6qq.pages.dev")

          if not upload_url:
              print("No upload_url in response - response:", json.dumps(dep, indent=2)[:500])
              exit(0)  # Might not need upload if GitHub source handles it

          print(f"Upload URL: {upload_url[:80]}...")

          # Upload files
          for fname, fhash in manifest.items():
              if not os.path.exists(fname):
                  continue
              with open(fname, "rb") as fp:
                  content = fp.read()

              req = urllib.request.Request(
                  upload_url,
                  data=content,
                  headers={
                      "x-content-hash": fhash,
                      "Content-Type": "application/octet-stream",
                  },
                  method="PUT"
              )
              try:
                  resp2 = urllib.request.urlopen(req)
                  print(f"  Uploaded: {fname} ({resp2.status})")
              except urllib.error.HTTPError as e:
                  err = e.read().decode()[:100]
                  print(f"  Error uploading {fname}: {err}")

          print("Done!")
          print(f"Deployment: {dep_id}")
          print("URL: https://themachine-corp-6qq.pages.dev")
          PYEOF
