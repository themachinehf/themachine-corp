name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via Cloudflare Pages API
        run: |
          python3 << 'PYEOF'
          import os, json, hashlib, urllib.request, urllib.error

          account_id = "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          token = "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          hf_auth = {"Authorization": f"Bearer {token}"}
          project = "themachine-corp"

          # Build manifest - skip workers/ dir and heavy dirs
          skip = {".git", "node_modules", ".github", ".venv", "__pycache__"}
          skip_prefixes = ("workers/",)
          manifest = {}
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in skip]
              for f in files:
                  if f.endswith(".bak") or f.startswith("."):
                      continue
                  path = os.path.join(root, f)
                  if any(path.startswith(s) for s in skip_prefixes):
                      continue
                  name = path[2:]
                  try:
                      with open(path, "rb") as fp:
                          h = hashlib.sha256(fp.read()).hexdigest()
                      manifest[name] = h
                  except:
                      pass

          print(f"Manifest: {len(manifest)} files")

          # Create deployment via Cloudflare Pages API
          import subprocess
          manifest_json = json.dumps(manifest)
          result = subprocess.run([
              "curl", "-s", "--noproxy", "*", "-X", "POST",
              f"https://api.cloudflare.com/client/v4/accounts/{account_id}/pages/projects/{project}/deployments",
              "-H", f"Authorization: Bearer {token}",
              "-F", "branch=main",
              "-F", f"manifest={manifest_json};type=application/json"
          ], capture_output=True, text=True)

          resp = json.loads(result.stdout)
          if not resp.get("success"):
              print("Create deployment ERROR:", resp.get("errors"))
              exit(1)

          dep = resp["result"]
          dep_id = dep["id"]
          upload_url = dep.get("upload_url", "")
          print(f"Deployment created: {dep_id}")

          if not upload_url:
              print("No upload_url. Response:", json.dumps(dep, indent=2)[:500])
              exit(0)

          # Upload files
          for fname, fhash in manifest.items():
              if not os.path.exists(fname):
                  continue
              req = urllib.request.Request(
                  upload_url,
                  data=open(fname, "rb").read(),
                  headers={"x-content-hash": fhash, "Content-Type": "application/octet-stream"},
                  method="PUT"
              )
              try:
                  resp2 = urllib.request.urlopen(req)
                  print(f"  OK: {fname}")
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:100]
                  print(f"  FAIL: {fname} | {e.code} | {body}")

          print(f"\nDeployment complete: {dep_id}")
          PYEOF
