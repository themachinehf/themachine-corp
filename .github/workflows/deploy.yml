name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger Cloudflare Pages deployment
        run: |
          echo "Cloudflare Pages GitHub integration will auto-deploy on push."
          echo "Pushed commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Done! Cloudflare handles the rest."
