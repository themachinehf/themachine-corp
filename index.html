<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMACHINE CORP.</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --bg:#0d0d12; --gold:#d4af37; --cyan:#00ffff; --magenta:#ff00ff; }
    html,body { background:var(--bg); color:#fff; font-family:'Press Start 2P',monospace; min-height:100vh; overflow-x:hidden; }
    .wrapper { min-height:100vh; display:flex; flex-direction:column; padding-bottom:50px; }
    .container { max-width:800px; margin:0 auto; padding:30px 15px; text-align:center; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    
    @media (max-width:600px) {
      .logo{font-size:clamp(14px,5vw,24px)!important}
      .tagline{font-size:clamp(8px,2vw,11px)!important;margin:10px 0!important}
      .agents{gap:4px!important;margin-bottom:12px!important}
      .agent{width:28px!important;height:44px!important}
      .desc{font-size:clamp(7px,2vw,10px)!important;margin-bottom:15px!important}
      .menu-btn{padding:8px 12px!important;font-size:clamp(7px,2vw,10px)!important}
      .quote{font-size:clamp(6px,1.5vw,9px)!important;margin-top:15px!important}
    }
    
    .nav{display:flex;align-items:center;padding:15px 20px;border-bottom:2px solid var(--cyan);background:rgba(0,0,0,0.8);position:sticky;top:0;z-index:100}
    .nav-logo{font-size:clamp(12px,2vw,16px);color:var(--gold);text-shadow:2px 2px 0 var(--cyan);text-decoration:none}
    .logo{font-size:clamp(20px,5vw,38px);color:var(--gold);text-shadow:2px 2px 0 var(--cyan);animation:glow 2s ease-in-out infinite}
    @keyframes glow{0%,100%{text-shadow:2px 2px 0 var(--cyan)}50%{text-shadow:0 0 20px var(--gold),2px 2px 0 var(--cyan)}}
    .tagline{font-size:clamp(10px,2vw,14px);color:#666;margin:15px 0}
    
    .agents{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
    .agent{width:40px;height:55px;display:flex;align-items:center;justify-content:center}
    .agent svg{width:100%;height:100%;image-rendering:pixelated}
    .agent{animation:bounce 1s infinite}
    .agent:nth-child(1){animation-delay:0s}
    .agent:nth-child(2){animation-delay:0.1s}
    .agent:nth-child(3){animation-delay:0.2s}
    .agent:nth-child(4){animation-delay:0.3s}
    .agent:nth-child(5){animation-delay:0.4s}
    .agent:nth-child(6){animation-delay:0.5s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    
    .desc{font-size:clamp(9px,2vw,12px);color:#777;max-width:500px;margin-bottom:20px;line-height:1.6}
    .menu{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:480px}
    .menu-btn{padding:10px 16px;background:rgba(0,255,255,0.05);border:2px solid var(--cyan);color:var(--cyan);font-size:clamp(8px,1.5vw,11px);text-decoration:none;transition:all 0.2s}
    .menu-btn:hover,.menu-btn:active{background:var(--cyan);color:var(--bg)}
    .menu-btn.gold{border-color:var(--gold);color:var(--gold)}
    .menu-btn.gold:hover{background:var(--gold)}
    .menu-btn.magenta{border-color:var(--magenta);color:var(--magenta)}
    .menu-btn.magenta:hover{background:var(--magenta);color:#fff}
    .quote{font-size:clamp(8px,1.5vw,11px);color:#555;margin-top:25px;font-style:italic}
    .hud{position:fixed;bottom:0;left:0;right:0;padding:10px 15px;background:rgba(0,0,0,0.9);border-top:2px solid var(--cyan);display:flex;justify-content:space-between;font-size:clamp(7px,1.2vw,10px)}
    .hud-item{display:flex;gap:6px}
    .hud-label{color:var(--cyan)}
    .hud-value{color:var(--gold)}
    .marquee{position:fixed;top:10px;left:0;font-size:clamp(6px,1.2vw,9px);color:var(--magenta);white-space:nowrap;animation:scroll 15s linear infinite}
    @keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  </style>
</head>
