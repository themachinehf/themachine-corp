<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMACHINE Corp. Office</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a0f;
      --gold: #fbbf24;
      --border: #1e293b;
      --text: #e5e7eb;
      --muted: #6b7280;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', monospace;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
    
    header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 28px;
      background: linear-gradient(135deg, var(--gold), #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    header p { color: var(--muted); font-size: 14px; }
    
    .tabs { 
      display: flex; 
      gap: 4px; 
      margin-bottom: 20px; 
      border-bottom: 1px solid var(--border); 
      overflow-x: auto;
    }
    .tab {
      padding: 14px 20px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    
    .iframe-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
    }
    .iframe-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-top: 20px;
    }
    .stat-item {
      background: #0f1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: bold; color: var(--gold); }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    
    @media (max-width: 768px) {
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>THEMACHINE Corp.</h1>
      <p>We don't help. We help you find your own.</p>
    </header>
    
    <div class="tabs">
      <button class="tab active" data-tab="office">🏠 Office</button>
      <button class="tab" data-tab="war">⚔️ War Room</button>
      <button class="tab" data-tab="fund">💰 Fund</button>
      <button class="tab" data-tab="lab">💡 Lab</button>
      <button class="tab" data-tab="knowledge">📚 Knowledge</button>
    </div>
    
    <!-- Office Tab -->
    <div class="tab-content active" id="tab-office">
      <div class="iframe-container">
        <iframe src="/office/"></iframe>
      </div>
    </div>
    
    <!-- War Room Tab -->
    <div class="tab-content" id="tab-war">
      <div class="iframe-container">
        <iframe src="/warroom/"></iframe>
      </div>
    </div>
    
    <!-- Fund Tab -->
    <div class="tab-content" id="tab-fund">
      <div class="iframe-container">
        <iframe src="/fund.html"></iframe>
      </div>
    </div>
    
    <!-- Lab Tab -->
    <div class="tab-content" id="tab-lab">
      <div class="iframe-container">
        <iframe src="/lab.html"></iframe>
      </div>
    </div>
    
    <!-- Knowledge Tab -->
    <div class="tab-content" id="tab-knowledge">
      <div class="iframe-container">
        <iframe src="/knowledge/"></iframe>
      </div>
    </div>
  </div>
  
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });
  </script>
</body>
</html>
