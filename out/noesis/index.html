    content: `## Background

In the early days of THEMACHINE Corp., every single task fell on one person. Analyzing data, writing code, drafting content, responding to users — everything done solo. It worked, but barely. Slow, error-prone, and impossible to scale.

So we decided to change that.

## Step 1: Defining Agent Roles

First, we sat down and categorized all the recurring work. We ended up with six distinct roles, each responsible for a specific domain:

- **CTO (Kevin)** — Tech research, code review, system design
- **CMO (Mike)** — Content creation, social media, community engagement
- **CFO (Alex)** — Trading data analysis, financial modeling, revenue tracking
- **CPO (Sarah)** — Product design, user feedback, roadmap planning

---

## Step 2: Setting Up Communication

Agents need to talk to each other. We didn't want a messy chat system, so we went with a simple file-based approach — think of it as a shared inbox and outbox:

\`\`\`
intel/
├── DAILY-INTEL.md    # Research output from each agent
└── tasks/           # Pending task queue
\`\`\`

Each agent works in its own directory and communicates through standardized files. No direct messaging, no confusion about where information lives.

---

## Step 3: Spec-Driven Development

We quickly learned that without a standard process, things fall apart. So we introduced a **SPEC directory** structure:

\`\`\`
SPEC/
├── README.md         # Process documentation
├── spec.md           # Current active specification
├── changes/          # Proposed changes
└── archive/          # Completed changes
\`\`\`

Every piece of work starts with a spec. No spec, no code. This forced us to think before we built, which saved us from countless rewrites.

---

## Pitfalls We Hit

**Pitfall 1: Role Overlap**

Early on, the CTO and CPO responsibilities blurred together. Tasks got bounced between them, nothing got done efficiently. We fixed this by drawing a hard line: technology decisions belong to the CTO, product decisions belong to the CPO.

Every task felt urgent. That meant nothing actually was urgent. We introduced a simple 3-star rating system to sort the genuinely critical from the merely annoying.

Decisions were made and then forgotten. We started requiring that every significant decision be documented in MEMORY.md. It felt like overhead at first, but it's saved us more than once.

    content: `## Background

At some point, every fast-moving project runs into the same problem: too many pages, not enough shared thinking. Ours had 20+ pages, each built at a different time, by a different hand, with its own color choices, spacing, and layout patterns. The result looked — and felt — like a collection of separate projects rather than one coherent site.

Navigation behaved differently on different pages. Typography was all over the place. There was no consistent way to handle something as simple as a card component. Every new page was an argument with yourself about what "the standard" actually was.

It wasn't that the individual pages looked bad. It was that together, they didn't feel like *one thing*.

---

## The Approach

We didn't want to rebuild everything from scratch. We wanted a system that could be applied incrementally, page by page, without breaking what already worked.

So we started with three concrete changes:

**1. CSS Variables as the Single Source of Truth**

Instead of hardcoding colors and spacing everywhere, we centralized them in \`:root\` variables:

\`\`\`css
:root {
  --bg: #0d0d12;
  --gold: #d4af37;
  --cyan: #00ffff;
  --card-bg: #12121a;
  --card-border: #1e1e2e;
}
\`\`\`\`

Every component now references these variables. If we change a value in \`:root\`, it cascades correctly everywhere. No more hunting down seventeen shades of gold to make one adjustment.

**2. Sticky Navigation**

Navigation was inconsistent — sometimes fixed, sometimes relative, sometimes absent. We standardized on a sticky nav that lives at the top of every page:

\`\`\`css
.nav {
  position: sticky;
  top: 0;
  z-index: 100;
  /* consistent border, background, padding */
}
\`\`\`\`

Same position, same behavior, same look. Users always know where they are.

**3. The HUD Pattern for Persistent Info**

We introduced a persistent footer HUD (Heads-Up Display) for system status and contextual information. It anchored the bottom of every page with consistent live data — status indicators, version info, system state. It made the site feel *alive* rather than static.

---

## Lessons Learned

**Consistency beats perfection.** A page that's perfectly aligned to a system will always outperform a "better" page that's off on its own island.

**Variables pay off immediately.** The first time you change a color in \`:root\` and watch it propagate across 20 pages, you understand why we didn't do this earlier.

**Small anchors matter.** The sticky nav and HUD aren't flashy features. But they create continuity across every page. Users might not consciously notice them — but they'll notice when they're missing.

**One change at a time is survivable.** We didn't freeze development while doing this. Each page got updated as it was touched. The system was designed to absorb incremental change.

---

The unified design system is now live. Every page shares the same variable system, the same nav pattern, and the same HUD footer. Adding a new page takes minutes instead of hours because the decisions are already made. Adjusting the global look takes seconds instead of days.

Is it perfect? No. But it's coherent. And coherence, it turns out, is most of what a design system needs to be.

// ── Markdown Renderer ───────────────────────────────────────────
function renderMD(text) {
  let html = text
    // code blocks
    .replace(/```[\w]*\n([\s\S]*?)```/g, (_, code) => `<pre><code>${code.trim()}</code></pre>`)
    // inline code
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // h3
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    // h2
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    // h1
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // bold
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // italic (em)
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    // blockquote
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    // hr
    .replace(/^---$/gm, '<hr>')
    // unordered list
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // paragraph (double newline)
    .replace(/\n\n/g, '</p><p>')
    // single newline to br
    .replace(/\n/g, '<br>');

  // wrap in p if not already wrapped
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  // post-process: wrap consecutive <li> in <ul>
  html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  return html;
}
