<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THEMACHINE - Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0d0d12; --gold: #d4af37; --cyan: #00ffff; --green: #00ff00; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: var(--bg); color: #fff; font-family: 'Press Start 2P', monospace; min-height: 100vh; }
    
    .container { max-width: 400px; margin: 0 auto; padding: 30px 15px; }
    
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 14px; color: var(--gold); margin-bottom: 8px; }
    .header p { font-size: 10px; color: #666; }
    
    .form { background: rgba(255,255,255,0.02); border: 2px solid #333; padding: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-size: 10px; color: #888; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #333; color: #fff; font-family: inherit; font-size: 12px; }
    .form-group input:focus { border-color: var(--cyan); outline: none; }
    
    .btn { width: 100%; padding: 12px; background: var(--gold); color: var(--bg); border: none; font-family: inherit; font-size: 12px; cursor: pointer; }
    .btn:hover { background: var(--cyan); }
    
    .success { display: none; text-align: center; padding: 20px; }
    .success.show { display: block; }
    .success .icon { font-size: 40px; margin-bottom: 15px; }
    .success h2 { font-size: 10px; color: var(--green); margin-bottom: 10px; }
    .success p { font-size: 10px; color: #888; }
    
    .back { position: fixed; top: 10px; left: 10px; padding: 8px 12px; background: var(--gold); color: var(--bg); text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>
  <a href="/" class="back">← BACK</a>
  
  <div class="container">
    <div class="header">
      <h1>[>] JOIN US</h1>
      <p>Get early access to our AI products</p>
    </div>
    
    <div class="form" id="form">
      <div class="form-group">
        <label>NAME</label>
        <input type="text" id="name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>EMAIL</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>WHAT INTEREST YOU MOST?</label>
        <input type="text" id="interest" placeholder="Socrates AI / Toolbox / All">
      </div>
      <button class="btn" onclick="submit()">REGISTER NOW</button>
    </div>
    
    <div class="success" id="success">
      <div class="icon">✅</div>
      <h2>WELCOME!</h2>
      <p>You're on the list. We'll contact you soon.</p>
    </div>
  </div>
  
  <script>
    function submit() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const interest = document.getElementById('interest').value;
      
      if(!name || !email) {
        alert('Please fill in all fields');
        return;
      }
      
      // 保存到localStorage（演示用）
      const users = JSON.parse(localStorage.getItem('themachine_users') || '[]');
      users.push({ name, email, interest, date: new Date().toISOString() });
      localStorage.setItem('themachine_users', JSON.stringify(users));
      
      document.getElementById('form').style.display = 'none';
      document.getElementById('success').classList.add('show');
    }
  </script>
</body>
</html>
