<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account - THEMACHINE Corp.</title>
  <style>
    :root { --bg: #0a0a0f; --text: #e5e7eb; --gold: #fbbf24; --border: #1e293b; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; min-height: 100vh; padding: 40px 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: var(--gold); font-size: 24px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
    .card { background: rgba(255,255,255,0.03); border: 2px solid var(--border); padding: 30px; border-radius: 8px; margin-bottom: 20px; }
    .card h2 { font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; color: var(--gold); }
    .product { display: flex; justify-content: space-between; align-items: center; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; border-radius: 4px; }
    .product-name { font-weight: bold; }
    .product-status { padding: 5px 15px; border-radius: 4px; font-size: 12px; }
    .free { background: rgba(251,191,36,0.2); color: var(--gold); }
    .pro { background: rgba(34,197,94,0.2); color: #22c55e; }
    .btn { padding: 10px 20px; background: var(--gold); color: var(--bg); text-decoration: none; font-weight: bold; font-size: 12px; border-radius: 4px; }
    .btn-outline { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
    .logout { float: right; font-size: 12px; color: #6b7280; cursor: pointer; }
  </style>
<script>
    // Check if logged in
    const sessionId = localStorage.getItem('sessionId');
    if (!sessionId) {
      window.location.href = '/login.html';
    }
    
    function logout() {
      localStorage.removeItem('sessionId');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }
  </script>
</head>
<body>
  <div class="container">
    <a href="/" class="logout">← Back to Home</a>
    <a href="#" onclick="logout()" class="logout" style="margin-left: 20px;">Logout</a>
    <h1>My Account</h1>
    
    <div class="card">
      <h2>Profile</h2>
      <p id="email">Loading...</p>
    </div>
    
    <div class="card">
      <h2>My Products</h2>
      
      <div class="product">
        <span class="product-name">THEMATHINK</span>
        <span class="product-status free">Free</span>
        <a href="/themathink/" class="btn">Open</a>
      </div>
      
      <div class="product">
        <span class="product-name">Mystic AI</span>
        <span class="product-status free">Free</span>
        <a href="/mystic-ai/" class="btn">Open</a>
      </div>
      
      <div class="product">
        <span class="product-name">FORGE</span>
        <span class="product-status free">Free</span>
        <a href="/forge/" class="btn">Open</a>
      </div>
      
      <div class="product">
        <span class="product-name">SOCIAL</span>
        <span class="product-status free">Free</span>
        <a href="/social/" class="btn">Open</a>
      </div>
    </div>
    
    <div class="card">
      <h2>Upgrade</h2>
      <p style="margin-bottom: 20px; color: #9ca3af;">Get unlimited access to all products!</p>
      <a href="#" class="btn">Coming Soon</a>
    </div>
  </div>
  
  <script>
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) {
      window.location.href = '/login.html';
    }
    document.getElementById('email').textContent = user?.email || 'No email';
    
    function logout() {
      localStorage.removeItem('user');
      window.location.href = '/';
    }
  </script>
</body>
</html>
